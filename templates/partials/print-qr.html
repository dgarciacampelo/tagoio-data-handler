<!-- Print Template Partial -->
<template id="qr-print-template">
    <!DOCTYPE html>
    <html lang="es">

    <head>
        <title>Cartel QR - __STATION_NAME__</title>
        <style>
            @media print {
                @page {
                    size: A4 portrait;
                    margin: 0;
                }

                body {
                    -webkit-print-color-adjust: exact;
                    print-color-adjust: exact;
                }
            }

            body {
                margin: 0;
                padding: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: white;
                color: #1a1a1a;
            }

            .header {
                color: #00571b;
                font-size: 3.5rem;
                font-weight: bold;
                margin-bottom: 10px;
            }

            .subtitle {
                font-size: 2.2rem;
                color: #4a4a4a;
                margin-top: 0;
                margin-bottom: 40px;
            }

            .qr-container {
                padding: 20px;
                border: 4px solid #00571b;
                border-radius: 24px;
                display: inline-block;
            }

            .qr-image {
                width: 350px;
                height: auto;
            }

            .info-box {
                margin-top: 40px;
                text-align: center;
                font-size: 1.8rem;
                color: #4a4a4a;
                line-height: 1.5;
                overflow-wrap: break-word;
                max-width: 90%;
            }

            .bold {
                font-weight: bold;
                color: #1a1a1a;
            }
        </style>
    </head>

    <body>
        <div class="header">Velo Energy</div>
        <div class="subtitle">Escanea para Recargar</div>

        <div class="qr-container">
            <img class="qr-image" src="__QR_DATA_URL__" alt="Código QR del Punto de Recarga" />
        </div>

        <div class="info-box">
            <p>Operador (CPO): <span class="bold">__CPO_NAME__</span></p>
            <p>Instalación: <span class="bold">__POOL_NAME__</span></p>
            <p>Punto de Recarga: <span class="bold">__STATION_NAME__</span></p>
        </div>

        <script>
            window.onload = function () {
                window.print();
            };
        </script>
    </body>

    </html>
</template>
